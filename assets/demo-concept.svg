<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340">
  <!-- Background -->
  <rect width="800" height="340" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">Look at a pane → it gets focus</text>
  <text x="400" y="55" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="12">No keyboard or mouse needed</text>

  <!-- ===== LEFT: Face with eyes ===== -->
  <ellipse cx="275" cy="170" rx="65" ry="80" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>

  <!-- Left eye -->
  <g>
    <ellipse cx="247" cy="150" rx="18" ry="12" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5">
      <!-- Blink -->
      <animate attributeName="ry" values="12;12;12;1;12;12;12;12;12;12;12;1;12" dur="6s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Left iris -->
    <circle r="5" fill="#22d3ee">
      <!-- Iris moves: pane1 (top-left) → pane2 (top-right) → pane3 (bottom) → pane1 -->
      <animate attributeName="cx" values="245;245;252;252;252;248;248;245;245" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="150;150;148;148;148;153;153;150;150" dur="8s" repeatCount="indefinite"/>
    </circle>
    <!-- Left pupil -->
    <circle r="2" fill="#0f172a">
      <animate attributeName="cx" values="245;245;252;252;252;248;248;245;245" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="150;150;148;148;148;153;153;150;150" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Right eye -->
  <g>
    <ellipse cx="303" cy="150" rx="18" ry="12" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5">
      <animate attributeName="ry" values="12;12;12;1;12;12;12;12;12;12;12;1;12" dur="6s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Right iris -->
    <circle r="5" fill="#22d3ee">
      <animate attributeName="cx" values="301;301;310;310;310;305;305;301;301" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="150;150;148;148;148;153;153;150;150" dur="8s" repeatCount="indefinite"/>
    </circle>
    <!-- Right pupil -->
    <circle r="2" fill="#0f172a">
      <animate attributeName="cx" values="301;301;310;310;310;305;305;301;301" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="150;150;148;148;148;153;153;150;150" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Eye tracking ray (left eye) -->
  <line x1="255" y1="148" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="4 3">
    <animate attributeName="opacity" values="0.3;0.3;0.5;0.5;0.5;0.4;0.4;0.3;0.3" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="570;570;700;700;700;640;640;570;570" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="130;130;130;130;130;230;230;130;130" dur="8s" repeatCount="indefinite"/>
  </line>
  <!-- Eye tracking ray (right eye) -->
  <line x1="311" y1="148" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="4 3">
    <animate attributeName="opacity" values="0.3;0.3;0.5;0.5;0.5;0.4;0.4;0.3;0.3" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="570;570;700;700;700;640;640;570;570" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="130;130;130;130;130;230;230;130;130" dur="8s" repeatCount="indefinite"/>
  </line>

  <!-- Nose & Mouth -->
  <path d="M272 170 Q275 185 278 170" fill="none" stroke="#475569" stroke-width="1"/>
  <path d="M260 200 Q275 210 290 200" fill="none" stroke="#475569" stroke-width="1.5"/>

  <!-- Label: Webcam -->
  <text x="275" y="280" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Webcam</text>
  <text x="275" y="298" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Eye Tracking</text>
  <rect x="255" y="305" width="40" height="25" rx="4" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <circle cx="275" cy="317" r="7" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <circle cx="275" cy="317" r="3" fill="#64748b"/>

  <!-- ===== MIDDLE: Arrow with processing ===== -->
  <line x1="365" y1="170" x2="500" y2="170" stroke="#4ade80" stroke-width="2" stroke-dasharray="6 4">
    <animate attributeName="stroke-dashoffset" values="20;0" dur="1s" repeatCount="indefinite"/>
  </line>
  <polygon points="500,162 515,170 500,178" fill="#4ade80"/>

  <text x="440" y="145" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="10" font-weight="600">MediaPipe</text>
  <text x="440" y="158" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Face Mesh</text>
  <text x="440" y="195" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">478 landmarks</text>
  <text x="440" y="208" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">+ head pose</text>

  <!-- ===== RIGHT: tmux window ===== -->
  <rect x="530" y="80" width="240" height="200" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="530" y="80" width="240" height="22" rx="8" fill="#334155"/>
  <rect x="530" y="94" width="240" height="8" fill="#334155"/>
  <circle cx="545" cy="91" r="4" fill="#ef4444"/>
  <circle cx="558" cy="91" r="4" fill="#eab308"/>
  <circle cx="571" cy="91" r="4" fill="#22c55e"/>
  <text x="650" y="95" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10">tmux</text>

  <!-- Pane 1 (top-left) -->
  <rect x="534" y="106" width="113" height="80" rx="2" fill="#0f172a" stroke-width="1.5">
    <!-- Border: green when active, gray otherwise -->
    <animate attributeName="stroke" values="#4ade80;#4ade80;#334155;#334155;#334155;#334155;#334155;#4ade80;#4ade80" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="2.5;2.5;1.5;1.5;1.5;1.5;1.5;2.5;2.5" dur="8s" repeatCount="indefinite"/>
  </rect>
  <text x="545" y="122" fill="#4ade80" font-family="monospace" font-size="9">$ vim main.py</text>
  <text x="545" y="135" fill="#64748b" font-family="monospace" font-size="8">def main():</text>
  <text x="545" y="146" fill="#64748b" font-family="monospace" font-size="8">  app = init()</text>
  <text x="545" y="157" fill="#64748b" font-family="monospace" font-size="8">  app.run()</text>
  <!-- Cursor blink -->
  <rect x="545" y="160" width="5" height="10" fill="#4ade80">
    <animate attributeName="opacity" values="0.8;0.8;0;0;0;0;0;0.8;0.8" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- Pane 2 (top-right) -->
  <rect x="651" y="106" width="115" height="80" rx="2" fill="#0f172a" stroke-width="1.5">
    <animate attributeName="stroke" values="#334155;#334155;#4ade80;#4ade80;#4ade80;#334155;#334155;#334155;#334155" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="1.5;1.5;2.5;2.5;2.5;1.5;1.5;1.5;1.5" dur="8s" repeatCount="indefinite"/>
  </rect>
  <text x="660" y="122" fill="#a78bfa" font-family="monospace" font-size="9">$ pytest -v</text>
  <text x="660" y="135" fill="#4ade80" font-family="monospace" font-size="8">PASSED test_1</text>
  <text x="660" y="146" fill="#4ade80" font-family="monospace" font-size="8">PASSED test_2</text>
  <text x="660" y="157" fill="#ef4444" font-family="monospace" font-size="8">FAILED test_3</text>
  <rect x="660" y="160" width="5" height="10" fill="#a78bfa">
    <animate attributeName="opacity" values="0;0;0.8;0.8;0.8;0;0;0;0" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- Pane 3 (bottom) -->
  <rect x="534" y="190" width="232" height="86" rx="2" fill="#0f172a" stroke-width="1.5">
    <animate attributeName="stroke" values="#334155;#334155;#334155;#334155;#334155;#4ade80;#4ade80;#334155;#334155" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="1.5;1.5;1.5;1.5;1.5;2.5;2.5;1.5;1.5" dur="8s" repeatCount="indefinite"/>
  </rect>
  <text x="545" y="206" fill="#f59e0b" font-family="monospace" font-size="9">$ tail -f app.log</text>
  <text x="545" y="219" fill="#64748b" font-family="monospace" font-size="8">[INFO] Server started</text>
  <text x="545" y="230" fill="#64748b" font-family="monospace" font-size="8">[INFO] Connected: 3</text>
  <text x="545" y="241" fill="#64748b" font-family="monospace" font-size="8">[WARN] Timeout 1.2s</text>
  <rect x="545" y="244" width="5" height="10" fill="#f59e0b">
    <animate attributeName="opacity" values="0;0;0;0;0;0.8;0.8;0;0" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- Gaze cursor (animated across panes) -->
  <!-- Outer glow -->
  <circle r="10" fill="#4ade80" opacity="0.15">
    <animate attributeName="cx" values="575;575;700;700;700;640;640;575;575" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="140;140;140;140;140;230;230;140;140" dur="8s" repeatCount="indefinite"/>
    <!-- Pulse -->
    <animate attributeName="r" values="10;14;10;14;10;14;10;14;10" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Mid ring -->
  <circle r="6" fill="#4ade80" opacity="0.4">
    <animate attributeName="cx" values="575;575;700;700;700;640;640;575;575" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="140;140;140;140;140;230;230;140;140" dur="8s" repeatCount="indefinite"/>
  </circle>
  <!-- Center dot -->
  <circle r="3" fill="#ffffff" opacity="0.9">
    <animate attributeName="cx" values="575;575;700;700;700;640;640;575;575" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="140;140;140;140;140;230;230;140;140" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- tmux status bar -->
  <rect x="530" y="276" width="240" height="4" rx="1" fill="#334155"/>

  <!-- Label: tmux -->
  <text x="650" y="305" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13" font-weight="600">tmux Panes</text>
  <text x="650" y="323" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Auto-focus by gaze</text>
</svg>
