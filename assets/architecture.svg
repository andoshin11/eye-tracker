<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 260">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="260" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <text x="390" y="35" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">Architecture</text>
  <text x="390" y="52" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="11">Real-time pipeline running at ~30fps</text>

  <!-- Step 1: Webcam -->
  <rect x="20" y="75" width="120" height="110" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="80" y="108" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="22">&#x1F4F7;</text>
  <text x="80" y="135" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Webcam</text>
  <text x="80" y="152" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">30fps capture</text>
  <text x="80" y="165" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">OpenCV</text>

  <!-- Arrow 1 -->
  <line x1="145" y1="130" x2="175" y2="130" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow)"/>

  <!-- Step 2: Face Mesh -->
  <rect x="180" y="75" width="130" height="110" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="245" y="108" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="22">&#x1F441;</text>
  <text x="245" y="133" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11" font-weight="600">GazeEstimator</text>
  <text x="245" y="150" text-anchor="middle" fill="#22d3ee" font-family="system-ui, sans-serif" font-size="9">MediaPipe 478pts</text>
  <text x="245" y="163" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">iris + head pose</text>

  <!-- Arrow 2 -->
  <line x1="315" y1="130" x2="345" y2="130" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow)"/>

  <!-- Step 3: Calibrator -->
  <rect x="350" y="75" width="130" height="110" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="415" y="108" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="22">&#x1F3AF;</text>
  <text x="415" y="133" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Calibrator</text>
  <text x="415" y="150" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="9">9-point calibration</text>
  <text x="415" y="163" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">polynomial regression</text>

  <!-- Arrow 3 -->
  <line x1="485" y1="130" x2="515" y2="130" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow)"/>

  <!-- Step 4: Dwell Detection -->
  <rect x="520" y="75" width="120" height="110" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="580" y="108" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="22">&#x23F1;</text>
  <text x="580" y="133" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Dwell Detect</text>
  <text x="580" y="150" text-anchor="middle" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="9">EMA smoothing</text>
  <text x="580" y="163" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">gaze → screen pos</text>

  <!-- Arrow 4 -->
  <line x1="645" y1="130" x2="675" y2="130" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow)"/>

  <!-- Step 5: tmux -->
  <rect x="680" y="75" width="80" height="110" rx="10" fill="#1e293b" stroke="#4ade80" stroke-width="2"/>
  <text x="720" y="108" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="22">&#x1F5A5;</text>
  <text x="720" y="133" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="12" font-weight="700">tmux</text>
  <text x="720" y="150" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">select-pane</text>
  <text x="720" y="163" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">auto-switch</text>

  <!-- Bottom: feature vector flow -->
  <rect x="60" y="210" width="660" height="32" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="390" y="231" text-anchor="middle" fill="#475569" font-family="monospace" font-size="10">[iris_x, iris_y, head_yaw, head_pitch] → poly_regression → (screen_x, screen_y) → pane_id</text>
</svg>
